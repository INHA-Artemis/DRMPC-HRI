# 안내견(개)-시각장애인(사람) 페어 파라미터
# 단위: 거리[m], 질량[kg], 장력[N], 속도[m/s], 가속도[m/s^2]

enable_pair: true            # 페어 모델 사용 여부
vip_radius: 0.30             # 사람(주황 원) 반지름

# 사람 기본 위치(개 body frame 기준): 우측-후방
offset_right_m: 0.50         # 개 중심 기준 오른쪽 오프셋
offset_back_m: 0.30          # 개 중심 기준 뒤쪽 오프셋

# 사람 위치 하한 제약(항상 우측/후방 유지)
offset_right_min_m: 0.05     # 우측 최소 오프셋
offset_back_min_m: 0.02      # 후방 최소 오프셋

# 3D 강체 하니스(막대)를 2D 탑뷰로 투영할 때의 길이/각도 범위
rod_length_m: 1.00           # 실제 막대 길이
rod_angle_deg_min: 30.0      # 지면 대비 최소 각도(0도=지면 평행)
rod_angle_deg_max: 80.0      # 지면 대비 최대 각도

# 하니스 동역학/장력 파라미터
person_mass_kg: 65.0         # 사람 질량
spring_k: 40.0               # 스프링 강성
damping_c: 45.0              # 댐핑 계수
max_tension_n: 100.0         # 장력 상한
min_tension_n: 15.0          # 장력 하한(항상 의지/연결되는 상태 표현)

# 겹침 방지 / 안정화 파라미터
min_pair_clearance_m: 0.02   # 개-사람 최소 추가 여유거리(중심거리 하한에 더해짐)
max_pull_step_m: 0.03        # 한 스텝에서 장력으로 당겨지는 최대 거리

# 추종 거동(개가 리드, 사람이 추종)
follow_gain: 1.1             # 앵커 추종 이득
vip_speed_max_mps: 1.4       # 사람 속도 상한
vip_acc_max_mps2: 1.0        # 사람 가속도 상한

# 헤딩 스무딩 / 개 제자리 피벗 억제
heading_tau_s: 1.1           # 사람 헤딩이 개 헤딩으로 수렴하는 시간상수
dog_no_pivot_min_v_mps: 0.15 # 이 속도 이하에서는 개 회전율 감쇠

# 사람 보행(보폭) 다양성 모델: 에피소드마다 개별 프로파일 샘플링
vip_gait_enable: true
vip_base_speed_ratio_mean: 1.00
vip_base_speed_ratio_std: 0.10
vip_stride_amp_mean: 0.10
vip_stride_amp_std: 0.04
vip_stride_freq_hz_mean: 1.80
vip_stride_freq_hz_std: 0.20
vip_ou_theta: 1.20
vip_ou_sigma: 0.10
vip_gait_factor_min: 0.60
vip_gait_factor_max: 1.40
